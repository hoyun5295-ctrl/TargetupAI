    <!-- Open Graph (카카오톡 등 SNS 공유) -->

    <meta property="og:description" content="상품만 입력하면 전단지 자동 생성. 단축URL 발급부터 MMS 발송까지 한번에.">

    <meta property="og:site_name" content="한줄전단 AI">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="한줄전단 AI - 스마트 전단지 솔루션">
    <meta name="twitter:description" content="상품만 입력하면 전단지 자동 생성. 단축URL 발급부터 MMS 발송까지 한번에.">

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- 소스 보호: 우클릭/개발자도구/텍스트선택 차단 -->
    <script>
      (function() {
        // 우클릭 차단
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });

        // 키보드 단축키 차단
        document.addEventListener('keydown', function(e) {
          // F12
          if (e.key === 'F12') { e.preventDefault(); return; }
          // Ctrl+Shift+I (개발자도구)
          if (e.ctrlKey && e.shiftKey && e.key === 'I') { e.preventDefault(); return; }
          // Ctrl+Shift+J (콘솔)
          if (e.ctrlKey && e.shiftKey && e.key === 'J') { e.preventDefault(); return; }
          // Ctrl+Shift+C (요소 선택)
          if (e.ctrlKey && e.shiftKey && e.key === 'C') { e.preventDefault(); return; }
          // Ctrl+U (소스보기)
          if (e.ctrlKey && e.key === 'u') { e.preventDefault(); return; }
        });
      })();
    </script>
    <style>
      /* 텍스트 드래그 선택 차단 */
      body {
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
      }
      /* input, textarea는 선택 허용 */
      input, textarea, [contenteditable="true"] {
        -webkit-user-select: text;
        -moz-user-select: text;
        -ms-user-select: text;
        user-select: text;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

  </body>
